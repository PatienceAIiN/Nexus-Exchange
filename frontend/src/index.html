<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Nexus Exchange — FBIL Reference Rate Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Nexus Exchange is a secure digital exchange platform for fast, transparent, and reliable transactions.">
  <meta name="robots" content="index, follow">
  <meta name="keywords" content="Nexus Exchange, digital exchange, secure transactions, currency exchange">
  <link rel="canonical" href="https://nexusexchange.patienceai.in/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Nexus Exchange | Secure Digital Exchange Platform">
  <meta property="og:description" content="Trade and exchange with confidence on Nexus Exchange.">
  <meta property="og:url" content="https://nexusexchange.patienceai.in/">
  <meta property="og:site_name" content="Nexus Exchange">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nexus Exchange | Secure Digital Exchange Platform">
  <meta name="twitter:description" content="Trade and exchange with confidence on Nexus Exchange.">
  <meta name="theme-color" content="#00d4aa">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=3">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nexus Exchange",
      "url": "https://nexusexchange.patienceai.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nexusexchange.patienceai.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>
<body>
  <app-root>
    <style>
      .splash-screen {
        position: fixed;
        inset: 0;
        background: #0a0e17;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .splash-logo {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        animation: splash-pulse 2s ease-in-out infinite;
      }
      .splash-n {
        fill: none;
        stroke: #00d4aa;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 12px rgba(0, 212, 170, 0.4));
      }
      .splash-loader {
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #00d4aa, #6366f1);
        animation: splash-load 1.5s infinite ease-in-out;
      }
      .splash-text {
        color: #8899a6;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 16px;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      @keyframes splash-load {
        0% { left: -30%; }
        100% { left: 100%; }
      }
    </style>
    <div class="splash-screen">
      <svg class="splash-logo" viewBox="0 0 64 64">
        <path class="splash-n" d="M 18 46 L 18 18 L 46 46 L 46 18" />
      </svg>
      <div class="splash-loader"></div>
      <div class="splash-text">Nexus Exchange</div>
    </div>
  </app-root>
</body>
</html>
