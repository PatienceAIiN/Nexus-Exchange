<div class="auth-page admin-theme">
  <div class="market-grid"></div>
  <div class="ticker-strip" aria-hidden="true"><span>₹ $ € £ ¥ • FX • NSE • BSE • Bonds • Commodities • Crypto • </span></div>

  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card">
    <div class="brand">
      <h1 class="gradient-text">Nexus Exchange</h1>
      <span class="badge beta admin">Admin</span>
    </div>
    <p class="subtitle">Secure Super Admin Access</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="input-group">
        <label>Admin Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Enter admin username" autocomplete="username" />
      </div>

      <div class="input-group">
        <label>Admin Password</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Enter admin password" autocomplete="current-password" style="width: 100%; padding-right: 2.5rem;" />
          <button type="button" (click)="showPassword = !showPassword" style="position: absolute; right: 0.5rem; background: none; border: none; cursor: pointer; opacity: 0.7; padding: 0;">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            }
          </button>
        </div>
      </div>

      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }

      <button type="submit" class="btn btn-primary w-full centered-auth-btn" [disabled]="loading">
        @if (loading) { <span class="spinner"></span> } Secure Login
      </button>
    </form>

    <p class="auth-link"><a routerLink="/login">← Back to Client Portal</a></p>
  </div>
</div>
